services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: homecare
      POSTGRES_PASSWORD: homecare_dev
      POSTGRES_DB: homecare_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homecare -d homecare_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
